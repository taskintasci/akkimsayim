<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP: GitHub Pages özel HTTP header desteklemediği için güvenlik
         politikası burada meta olarak uygulanır (firebase.json header'ları
         yalnızca Firebase hosting'de geçerli). Not: frame-ancestors meta'da
         yok sayılır; clickjacking koruması ancak header ile tam olur. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://firestore.googleapis.com; img-src 'self' data:; frame-src https://sayimplani.firebaseapp.com; object-src 'none'; base-uri 'self';"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#003d8a" />
    <meta name="application-name" content="Akkim Sayım" />
    <meta name="description" content="Akkim Depolama Merkezi Kimyasal Sayım Sistemi" />
    <title>Akkim Depolama Merkezi Sayım Sistemi</title>
    <!-- DNS prefetch + preconnect: font sunucularına erken bağlan -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fontlar doğrudan HTML'de — CSS @import'a göre paralel yüklenir, render blocking azalır -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <style>
      /* Font yüklenene kadar ikon adlarını gizle */
      .ms { visibility: hidden; }
      body.ms-loaded .ms { visibility: visible; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
