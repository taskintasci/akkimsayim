<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a6bec"/>
      <stop offset="100%" stop-color="#003d8a"/>
    </linearGradient>
    <linearGradient id="g-liquid" x1="0" y1="370" x2="0" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#g-bg)"/>

  <!-- Flask opening rim (top cap) -->
  <rect x="214" y="68" width="84" height="18" rx="9" fill="rgba(255,255,255,0.82)"/>

  <!-- Flask neck -->
  <rect x="226" y="83" width="60" height="148" rx="4" fill="white"/>

  <!-- Flask body (conical / Erlenmeyer) -->
  <path d="M 226,228 L 100,412 Q 88,440 110,448 L 402,448 Q 424,440 412,412 L 286,228 Z" fill="white"/>

  <!-- Amber liquid fill (bottom third of flask) -->
  <path d="M 154,374 L 100,412 Q 88,440 110,448 L 402,448 Q 424,440 412,412 L 358,374 Z" fill="url(#g-liquid)"/>

  <!-- Bubbles in liquid (white, semi-transparent) -->
  <circle cx="196" cy="422" r="14" fill="white" opacity="0.36"/>
  <circle cx="283" cy="430" r="9"  fill="white" opacity="0.28"/>
  <circle cx="350" cy="416" r="11" fill="white" opacity="0.32"/>

  <!-- Bold white checkmark over liquid — reads at any size -->
  <path d="M 210,410 L 244,444 L 306,370"
        stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Subtle molecule dots in neck (decorative, only visible at large sizes) -->
  <circle cx="256" cy="130" r="7"  fill="#1a6bec" opacity="0.35"/>
  <circle cx="242" cy="160" r="5"  fill="#1a6bec" opacity="0.28"/>
  <circle cx="268" cy="188" r="6"  fill="#1a6bec" opacity="0.30"/>
</svg>
